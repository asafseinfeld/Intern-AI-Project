<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin - Honor AI Interviews</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f7fa;
    color: #1c2b3a;
    padding: 32px;
  }
  h1 { color: #0f2a4a; }
  .login-card {
    max-width: 360px;
    margin: 80px auto;
    background: white;
    padding: 32px;
    border-radius: 14px;
    box-shadow: 0 10px 40px rgba(15,42,74,0.12);
  }
  input[type=password] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #d8dee6;
    margin: 12px 0;
  }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #0f2a4a;
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid #eef2f7; font-size: 14px; }
  th { background: #eef2f7; color: #0f2a4a; }
  tr:hover { background: #fafbfc; cursor: pointer; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.completed { background: rgba(31,138,140,0.15); color: #1f8a8c; }
  .pill.in_progress { background: rgba(214,69,69,0.12); color: #d64545; }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(15,42,74,0.5);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: white; border-radius: 14px; padding: 28px; max-width: 640px; width: 100%;
    max-height: 85vh; overflow-y: auto;
  }
  .field { margin-bottom: 10px; font-size: 14px; }
  .field b { color: #0f2a4a; }
  .transcript-line { margin-bottom: 8px; font-size: 14px; }
  .transcript-line.interviewer { color: #1f8a8c; }
  .transcript-line.employee { color: #1c2b3a; font-weight: 500; }
  .hidden { display: none !important; }
  select { padding: 6px 10px; border-radius: 6px; border: 1px solid #d8dee6; }
</style>
</head>
<body>

<div class="login-card" id="loginCard">
  <h1 style="font-size:18px;">Admin login</h1>
  <input type="password" id="pw" placeholder="Admin password" />
  <button id="loginBtn">Log in</button>
  <p id="loginError" style="color:#d64545; font-size:13px;"></p>
</div>

<div id="dashboard" class="hidden">
  <h1>Honor AI Interview Responses</h1>
  <table id="table">
    <thead>
      <tr>
        <th>Name</th><th>Contact</th><th>Department</th><th>Status</th><th>Started</th><th>Reward</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="modal-bg hidden" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<script>
let adminPassword = null;

document.getElementById('loginBtn').addEventListener('click', async () => {
  const pw = document.getElementById('pw').value;
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  });
  if (res.ok) {
    adminPassword = pw;
    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadSessions();
  } else {
    document.getElementById('loginError').textContent = 'Incorrect password.';
  }
});

async function loadSessions() {
  const res = await fetch('/api/admin/sessions', {
    headers: { 'x-admin-password': adminPassword }
  });
  const sessions = await res.json();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  sessions.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${s.contact_name || '-'}</td>
      <td>${s.contact_info || '-'}</td>
      <td>${s.profile?.department || '-'}</td>
      <td><span class="pill ${s.status}">${s.status}</span></td>
      <td>${new Date(s.started_at).toLocaleString()}</td>
      <td>${s.reward_status}</td>
    `;
    tr.addEventListener('click', () => showModal(s));
    tbody.appendChild(tr);
  });
}

function showModal(s) {
  const modal = document.getElementById('modal');
  const profile = s.profile || {};
  const profileFields = Object.entries(profile)
    .map(([k, v]) => `<div class="field"><b>${k}:</b> ${Array.isArray(v) ? v.join(', ') : (v ?? '-')}</div>`)
    .join('');
  const transcriptHtml = s.transcript
    .filter(m => m.role === 'assistant' || (m.role === 'user' && m.content !== '(session start)'))
    .map(m => `<div class="transcript-line ${m.role === 'assistant' ? 'interviewer' : 'employee'}">
        <b>${m.role === 'assistant' ? 'Interviewer' : 'Employee'}:</b> ${m.content}
      </div>`).join('');

  modal.innerHTML = `
    <h2 style="margin-top:0;">${s.contact_name || 'Anonymous'}</h2>
    <p style="color:#64748b; font-size:13px;">${s.contact_info || ''}</p>
    <h3>Profile summary</h3>
    ${profileFields || '<p>Not yet completed.</p>'}
    <h3>Full transcript</h3>
    ${transcriptHtml}
    <div style="margin-top:16px; display:flex; gap:10px; align-items:center;">
      <label>Reward status:</label>
      <select id="rewardSelect">
        <option value="pending" ${s.reward_status === 'pending' ? 'selected' : ''}>Pending</option>
        <option value="issued" ${s.reward_status === 'issued' ? 'selected' : ''}>Issued</option>
      </select>
      <button style="width:auto; padding:8px 14px;" id="saveReward">Save</button>
      <button style="width:auto; padding:8px 14px; background:#64748b;" id="closeModal">Close</button>
    </div>
  `;

  document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('modalBg').classList.add('hidden');
  });
  document.getElementById('saveReward').addEventListener('click', async () => {
    const status = document.getElementById('rewardSelect').value;
    await fetch('/api/admin/reward-status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ sessionId: s.id, status })
    });
    document.getElementById('modalBg').classList.add('hidden');
    loadSessions();
  });

  document.getElementById('modalBg').classList.remove('hidden');
}
</script>
</body>
</html>
